; ── Monochrome Polybar (acento branco, JetBrains Mono) ─────────

[colors]
bg      = #1a1a1a
surface = #222222
border  = #2a2a2a
fg      = #c8c8c8
accent  = #e8e8e8
accent_dim = #8a8a8a
gray    = #666666
red     = #e06c75
green   = #98c379
yellow  = #e5c07b
black   = #0d0d0d

[bar/main]
monitor = ${env:MONITOR}
width = 100%
height = 32
offset-x = 0
offset-y = 6
radius = 4
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
border-size = 1
border-color = ${colors.border}
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=13;4
modules-left = xworkspaces sep music-prev music-play music-next music-info sep volume
modules-center = date
modules-right = notifications sep wallpaper sep network battery sep powermenu
wm-restack = i3
override-redirect = false
enable-ipc = true

[module/sep]
type = custom/text
format = "|"
format-foreground = ${colors.border}

[module/xworkspaces]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = false
format = <label-state>
label-focused = %index%
label-focused-foreground = ${colors.accent}
label-focused-padding = 1
label-occupied = %index%
label-occupied-foreground = ${colors.gray}
label-occupied-padding = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1
label-visible = %index%
label-visible-foreground = ${colors.gray}
label-visible-padding = 1

[module/music-prev]
type = custom/text
format = "󰒮"
format-font = 2
format-foreground = ${colors.gray}
click-left = ~/.config/polybar/music_ctl.sh prev

[module/music-play]
type = custom/script
exec = ~/.config/polybar/playpause.sh
interval = 1
format-font = 2
format-foreground = ${colors.accent}
click-left = ~/.config/polybar/music_ctl.sh toggle

[module/music-next]
type = custom/text
format = "󰒭"
format-font = 2
format-foreground = ${colors.gray}
click-left = ~/.config/polybar/music_ctl.sh next

[module/music-info]
type = custom/script
exec = ~/.config/polybar/music_info.sh
interval = 2
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.accent_dim}
format-foreground = ${colors.fg}

[module/volume]
type = internal/pulseaudio
use-ui-max = false
interval = 2
format-volume = <ramp-volume> <label-volume>
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.accent}
label-volume = %percentage%%
label-volume-foreground = ${colors.fg}
format-muted = 󰖁 <label-muted>
format-muted-foreground = ${colors.accent_dim}
label-muted = muted
label-muted-foreground = ${colors.gray}
click-right = pavucontrol
click-middle = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +2%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -2%

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 3
format-foreground = ${colors.accent}
click-left = ~/.config/polybar/network-menu.sh

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 30

[module/date]
type = internal/date
interval = 30
date = %d %b
time = %I:%M %p
label = %time% · %date%
label-foreground = ${colors.fg}

[module/powermenu]
type = custom/text
format = "󰐥"
format-font = 2
format-foreground = ${colors.red}
click-left = ~/.config/rofi/powermenu.sh

[module/notifications]
type = custom/script
exec = ~/.config/polybar/notifications.sh
interval = 3
format-foreground = ${colors.accent}
click-left = ~/.config/polybar/notif-menu.sh
click-right = dunstctl close-all
scroll-up = dunstctl close-all

[module/wallpaper]
type = custom/text
format = "󰸉"
format-foreground = ${colors.accent}
format-padding = 1
click-left = ~/.config/polybar/pick_wallpaper.sh
click-right = ~/.config/polybar/next_wallpaper.sh
