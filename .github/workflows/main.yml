name: Check Approvals

on:
  pull_request:
    types: [labeled, unlabeled, synchronize]

jobs:
  check-labels:
    name: CO and QA Approval Required
    runs-on: ubuntu-latest
    steps:
      - name: Check required labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const labels = pr.labels.map(l => l.name);
            const hasQA = labels.includes('approved-qa');
            const hasCO = labels.includes('approved-co');

            if (!hasQA || !hasCO) {
              const missing = [];
              if (!hasCO) missing.push('approved-co');
              if (!hasQA) missing.push('approved-qa');
              core.setFailed(`Missing approvals: ${missing.join(', ')}`);
            } else {
              console.log('All approvals present. Merge allowed.');
            }
            
