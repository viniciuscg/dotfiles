name: Check Approvals
on: push
jobs:
  check-labels:
    name: CO and QA Approval Required
    runs-on: ubuntu-latest
    steps:
      - name: Check required labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            | grep '"name"' | awk -F'"' '{print $4}')
          echo "Labels encontradas: $LABELS"
          HAS_CO=$(echo "$LABELS" | grep -c "approved-co" || true)
          HAS_QA=$(echo "$LABELS" | grep -c "approved-qa" || true)
          if [ "$HAS_CO" -eq 0 ] && [ "$HAS_QA" -eq 0 ]; then
            echo "❌ Faltam as aprovações: approved-co, approved-qa"
            exit 1
          elif [ "$HAS_CO" -eq 0 ]; then
            echo "❌ Falta aprovação: approved-co"
            exit 1
          elif [ "$HAS_QA" -eq 0 ]; then
            echo "❌ Falta aprovação: approved-qa"
            exit 1
          else
            echo "✅ Ambas aprovações presentes. Merge liberado!"
          fi
