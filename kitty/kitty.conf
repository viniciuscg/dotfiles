# Kitty — alinhado à polybar (#1a1a1a · #e8e8e8 · JetBrains Mono)

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

disable_ligatures never

cursor_shape          beam
cursor_blink_interval 0.5

mouse_hide_wait       2.0
copy_on_select        clipboard
strip_trailing_spaces smart

repaint_delay       10
sync_to_monitor     yes

remember_window_size   no
initial_window_width   110c
initial_window_height  32c
window_padding_width   12
window_padding_height  12
hide_window_decorators yes
placement_strategy     center

background_opacity         0.96
background_blur            32
dynamic_background_opacity yes

tab_bar_edge        top
tab_bar_style       fade
# Com só 1 separador não mostra barra de tabs → área única com o terminal
tab_bar_min_tabs    2
tab_bar_margin_height 0
tab_bar_margin_width  0
tab_title_template  " {title} "
active_tab_font_style   bold
inactive_tab_font_style normal

# --- Cores (polybar) ---
foreground            #c8c8c8
background            #1a1a1a
selection_foreground  #e8e8e8
selection_background  #3a3a3a

cursor                #e8e8e8
cursor_text_color     #1a1a1a

color0  #1a1a1a
color8  #666666

color1  #e06c75
color9  #e06c75

color2  #98c379
color10 #98c379

color3  #e5c07b
color11 #e5c07b

color4  #c8c8c8
color12 #e8e8e8

color5  #8a8a8a
color13 #aaaaaa

color6  #8a8a8a
color14 #c8c8c8

color7  #c8c8c8
color15 #e8e8e8

active_tab_foreground    #e8e8e8
inactive_tab_foreground  #8a8a8a
# Mesmo fundo que o terminal — quando há várias tabs não aparece “faixa” diferente
active_tab_background    #1a1a1a
inactive_tab_background  #1a1a1a
tab_bar_background       #1a1a1a

active_border_color      #e8e8e8
inactive_border_color    #2a2a2a
bell_border_color        #e06c75

url_color   #e8e8e8
url_style   curly

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection

map ctrl+shift+equal       change_font_size all +1.0
map ctrl+shift+plus        change_font_size all +1.0
map ctrl+shift+minus       change_font_size all -1.0
map ctrl+shift+backspace   change_font_size all 0

map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+q     close_window

map ctrl+shift+l next_layout
enabled_layouts tall:bias=50;full_size=1,splits,stack,grid

map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>d set_background_opacity default

scrollback_lines 20000
map ctrl+shift+h show_scrollback

enable_audio_bell no
window_alert_on_bell yes

shell_integration enabled
allow_remote_control yes

clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

term xterm-256color
update_check_interval 0
detect_urls yes

dynamic_title yes
shell /usr/bin/zsh
