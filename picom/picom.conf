#################################
# Backend & sync
#################################
backend = "glx";
vsync = true;


#################################
# Rounded corners
#################################
corner-radius = 14;

rounded-corners = true;
rounded-corners-exclude = [
  "class_g != 'scratch-terminal' && class_g != 'Spotify'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];


#################################
# Opacidade
# - VS Code + Spotify: mais transparentes (regra ~78–80)
# - Todo o resto: leve (inactive/active abaixo; sem regra específica)
#################################
inactive-opacity = 0.94;
active-opacity = 0.98;

opacity-rule = [
  # Spotify — bem transparente
  "50:class_g = 'Spotify'",

  # VS Code / forks — igual ao Spotify
  "94:class_g = 'Code'",
  "94:class_g = 'VSCodium'",

  # Terminal scratch — um pouco mais que o global, menos que o editor
  "88:class_g = 'scratch-terminal'",

  # Kitty — transparência leve (igual “resto”, mas explícito)
  "93:class_g = 'kitty'"
];


#################################
# Blur suave (comentar se o picom falhar ao iniciar)
#################################
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
